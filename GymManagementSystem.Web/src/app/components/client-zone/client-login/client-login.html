        <div class="background-light-gray p-4 rounded shadow-sm">
          <h3 class="text-white text-center mb-3">Sign in</h3>

          <form>
            <div class="mb-3">
              <label class="form-label text-white">Email</label>
              <input type="email" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label text-white">Password</label>
              <input type="password" class="form-control" >
            </div>

            <button type="submit" class="button-green w-100 mb-3">
              Log in
            </button>
          </form>

          <div class="text-center">
            <span class="text-white">Don’t have an account?</span><br>
            <a href="#" class="text-green fw-bold text-decoration-none">
              Create account
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
