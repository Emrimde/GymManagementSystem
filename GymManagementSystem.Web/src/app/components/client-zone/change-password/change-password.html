<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">

      <div class="card shadow-sm background-black p-4">

        <h3 class="text-center text-green mb-4">
          Change Password
        </h3>

        <form [formGroup]="changePasswordForm" (ngSubmit)="submit()">

          <div class="mb-3">
            <label class="form-label text-white-bg">Current Password</label>
            <input
              type="password"
              formControlName="oldPassword"
              class="form-control"
              autocomplete="current-password"
            />
          </div>

          <div class="mb-3">
            <label class="form-label text-white-bg">New Password</label>
            <input
              type="password"
              formControlName="newPassword"
              class="form-control"
              autocomplete="new-password"
            />
          </div>

          <div class="mb-4">
            <label class="form-label text-white-bg">Confirm New Password</label>
            <input
              type="password"
              formControlName="confirmPassword"
              class="form-control"
              autocomplete="new-password"
            />
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn button-green fw-bold">
              Change Password
            </button>

            <button type="button" class="btn button-light-gray" routerLink="/client-main-page">
              Back
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>
