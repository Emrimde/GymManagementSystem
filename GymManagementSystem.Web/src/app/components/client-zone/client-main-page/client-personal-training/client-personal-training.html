<div class="card background-black shadow-sm p-4 h-100">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-green fw-bold mb-0">
      My personal trainings
    </h4>
@if(hasActiveMembership()){
  <button class="btn button-green fw-bold">
    + Add personal training
  </button>
}
  </div>
  <div class="row g-3 overflow-auto" style="max-height: 420px;">

  <div class="col-12">

      <h6 class="fw-bold text-white mb-2">
        Trainer: {{ personalBooking.trainerFullName }}
      </h6>
      <p class="mb-1 text-white">
        <strong>Date:</strong> {{ personalBooking.date }}
      </p>
      <p class="mb-0 text-white">
        <strong>Time:</strong> {{ personalBooking.startEndTime }}
      </p>
    </div>
  </div>
