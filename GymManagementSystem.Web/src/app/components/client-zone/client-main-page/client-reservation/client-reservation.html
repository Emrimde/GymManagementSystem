<div class="card background-black shadow-sm p-4 h-100">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-green fw-bold mb-0">
      My reserved classes
    </h4>
@if(hasActiveMembership()){
  <button class="btn button-green fw-bold" routerLink="/add-class-booking">
    + Book classes
  </button>
}
  </div>
  <div class="row g-3 overflow-auto" style="max-height: 420px;">
@for(personalBooking of scheduledClasses(); track personalBooking.name){

  <div class="col-12">
    <div class="card background-light-gray p-3 shadow-sm">
      <h6 class="fw-bold text-white mb-2">
        Name: {{ personalBooking.name }}
      </h6>
      <p class="mb-1 text-white">
        <strong>Date:</strong> {{ personalBooking.date }}
      </p>
      <p class="mb-0 text-white">
        <strong>Time:</strong> {{ personalBooking.startFrom }} - {{ personalBooking.startTo }}
      </p>
    </div>
  </div>
}


  </div>
</div>
