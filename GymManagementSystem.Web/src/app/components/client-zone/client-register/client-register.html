<div class="min-vh-100 d-flex align-items-center justify-content-center ">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6">

        <div class="background-black p-4 rounded shadow-sm">
          <h3 class="text-white text-center mb-2">Create account</h3>
          <p class="text-center text-green mb-4">Enter your details</p>

          <form [formGroup]="clientRegisterForm" (ngSubmit)="submit()">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label text-white">First name</label>
                <input type="text" formControlName="firstName" class="form-control">
              </div>

              <div class="col-md-6">
                <label class="form-label text-white">Last name</label>
                <input type="text" formControlName="lastName" class="form-control">
              </div>

              <div class="col-12">
                <label class="form-label text-white">Email</label>
                <input type="email" formControlName="email" class="form-control">
              </div>

              <div class="col-12">
                <label class="form-label text-white">Phone number</label>
                <input type="tel" formControlName="phoneNumber" class="form-control">
              </div>

              <div class="col-md-6">
                <label class="form-label text-white">Password</label>
                <input type="password" formControlName="password" class="form-control">
              </div>

              <div class="col-md-6">
                <label class="form-label text-white">Repeat password</label>
                <input type="password" formControlName="confirmPassword" class="form-control">
              </div>
            </div>

            <!-- <div class="mt-3 text-light-gray small">
              Password must be at least 8 characters and include:
              <ul class="mb-2">
                <li>one uppercase letter (A–Z)</li>
                <li>one lowercase letter (a–z)</li>
                <li>one digit (0–9)</li>
                <li>one symbol (!@#$%^&*-+=?)</li>
              </ul>
            </div> -->

            <!-- <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="terms">
              <label class="form-check-label text-white small" for="terms">
                I have read and accept the document
                <span class="text-green">Xtreme Fitness Gyms Terms</span>
              </label>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="privacy">
              <label class="form-check-label text-white small" for="privacy">
                By creating an account, you agree to our
                <span class="text-green">Privacy Policy</span>
              </label>
            </div> -->

            <button [disabled]="clientRegisterForm.invalid" type="submit" class="button-green w-100 mt-5 mb-3">
              Create account
            </button>
          </form>

          <div class="text-center">
            <span class="text-light-gray">Already have an account?</span><br>
            <a routerLink="/login-client" class="text-green fw-bold text-decoration-none">
              Sign in instead
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
