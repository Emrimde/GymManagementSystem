<div class="container min-vh-100 d-flex align-items-center justify-content-center">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

      <div class="background-black p-4 p-sm-5 rounded shadow-sm">

        <h3 class="text-white text-center mb-3">
          Reset password
        </h3>

        <p class="text-light-gray text-center small mb-4">
          Enter your email and we’ll send you a reset link
        </p>

        <form [formGroup]="resetPasswordForm" (ngSubmit)="submit()">

          <div class="mb-4">
            <label class="form-label text-white">Email</label>
            <input
              formControlName="email"
              type="email"
              class="form-control"
             >
          </div>

          <button
            [disabled]="resetPasswordForm.invalid"
            type="submit"
            class="button-green w-100 fw-bold">
            Send reset link
          </button>

        </form>

      </div>

    </div>
  </div>
</div>
